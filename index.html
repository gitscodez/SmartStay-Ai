<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStay AI | Premium Student Living</title>

    <style>
        :root {
            /* New Premium Brand Colors */
            --primary: #FFD700; /* Gold Accent */
            --secondary: #00E5FF; /* Cyan Glow */
            --dark: #020617;
            --glass-bg: rgba(15, 23, 42, 0.75);
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--dark);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Background Image with Overlay */
        .bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-image {
            width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&q=80&w=2070'); /* High-end Interior */
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) contrast(1.1);
            animation: slowZoom 20s infinite alternate;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, var(--dark) 90%);
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            width: 100%; height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }

        .loader-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--primary);
            margin-bottom: 25px;
            font-weight: bold;
        }

        .loadingBar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            animation: load 3s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes load {
            100% { width: 100%; }
        }

        /* Main Container */
        .container {
            display: none;
            text-align: center;
            opacity: 0;
            transform: scale(0.95);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .glass {
            padding: 70px 60px;
            border-radius: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            max-width: 550px;
        }

        h1 {
            font-size: 64px;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #FFFFFF 40%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -3px;
            text-transform: lowercase;
        }

        h1 span { color: var(--primary); }

        #quote {
            font-size: 18px;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.7);
            min-height: 28px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Start Button */
        button {
            margin-top: 50px;
            padding: 18px 55px;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: black;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.5s;
            box-shadow: 0 15px 30px -10px rgba(255, 215, 0, 0.4);
        }

        button:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px -10px rgba(255, 215, 0, 0.6);
            background: white;
        }

    </style>
</head>

<body>

    <div class="bg-container">
        <div class="bg-image"></div>
        <div class="bg-overlay"></div>
    </div>

    <div id="loadingScreen">
        <div class="loader-title">Authenticating Portal</div>
        <div class="loadingBar">
            <div class="progress"></div>
        </div>
    </div>

    <div class="container" id="mainUI">
        <div class="glass">
            <h1>SmartStay<span>AI</span></h1>
            <p id="quote"></p>
            <button onclick="enterSite()">Enter Platform</button>
        </div>
    </div>

    <script>
        /* Fade Logic */
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById("loadingScreen");
                const mainUI = document.getElementById("mainUI");
                
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    mainUI.style.display = "block";
                    setTimeout(() => {
                        mainUI.style.opacity = "1";
                        mainUI.style.transform = "scale(1)";
                    }, 100);
                }, 1000);
            }, 3000);
        });

        /* Typewriter Logic */
        const quotes = [
            "Luxury stays for modern students.",
            "Elevating your living experience.",
            "Live smart. Stay smart.",
            "Verified housing at your fingertips.",
            "The future of student housing."
        ];

        let quoteIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const quoteElement = document.getElementById("quote");

        function type() {
            const current = quotes[quoteIndex];
            if (isDeleting) {
                quoteElement.textContent = current.substring(0, charIndex - 1);
                charIndex--;
            } else {
                quoteElement.textContent = current.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 40 : 80;

            if (!isDeleting && charIndex === current.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                quoteIndex = (quoteIndex + 1) % quotes.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        setTimeout(type, 4000);

        function enterSite() {
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
